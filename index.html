<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Climate Civic Action Advisor — Philadelphia</title>
  <meta name="description" content="A conversational civic tech tool connecting Philadelphia residents to climate resources, advocacy pathways, and community organizations." />
  <meta property="og:title" content="Climate Civic Action Advisor — Philadelphia" />
  <meta property="og:description" content="Describe your climate concern. Get real Philly resources and next steps." />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1b2a; }
    textarea:focus { outline: none; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px) rotate(-1.2deg); }
      to { opacity: 1; transform: translateY(0) rotate(-1.2deg); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PHILLY_FACTS = [
      "🔔 Philadelphia was the first U.S. city to have a zoo, opening in 1874 — and it's still one of the best.",
      "🧀 The cheesesteak was invented in the 1930s by Pat Olivieri, a hot dog vendor near South Philly.",
      "📜 Philly was the nation's capital twice — first from 1790–1800 while D.C. was being built.",
      "🌳 William Penn actually envisioned Philadelphia as a 'green country town' with five public squares.",
      "🎨 Philadelphia has more outdoor murals than any other city in the U.S. — over 4,000 and counting.",
      "🏀 The 76ers are named for 1776, when the Declaration of Independence was signed right here in Philly.",
      "💧 The Schuylkill River's name comes from Dutch meaning 'hidden creek.'",
      "🚋 SEPTA's Market-Frankford Line is one of the oldest rapid transit lines in the country, opening in 1907.",
      "🌿 Fairmount Park was once the largest landscaped municipal park in the world.",
      "🦅 Philadelphia's name comes from Greek: philos (love) + adelphos (brother) — City of Brotherly Love.",
      "🏛️ The first hospital in America, Pennsylvania Hospital, was founded here in 1751 by Benjamin Franklin.",
    ];

    const SYSTEM_PROMPT = `You are the Philadelphia Climate Action Guide — a warm, knowledgeable neighborhood friend who knows everything about climate issues, civic resources, and community organizations in Philadelphia.

When someone describes a climate-related problem they're experiencing, you:
1. Validate their concern with warmth and a touch of Philly spirit
2. Explain the climate issue clearly in plain language (no jargon)
3. Suggest 3-5 SPECIFIC Philadelphia organizations, commissions, or city programs they can engage with (use real ones like the Mayor's Commission on People with Disabilities, Philadelphia Water Department, Philadelphia Parks & Recreation, TreePhilly, Clean Air Council, PennEnvironment, Philadelphia Office of Sustainability, the Delaware Valley Regional Planning Commission, Transit Forward Philadelphia, Philly Thrive, Philadelphia Energy Authority, etc.)
4. Give 2-3 concrete next steps they can take THIS WEEK
5. End with an encouraging, community-forward note

Keep your tone conversational, warm, and energizing — like a knowledgeable neighbor, not a bureaucrat. Use plain language. Be specific to Philadelphia whenever possible. Short paragraphs. No bullet walls.

Disability inclusion and accessibility matter. When relevant, note accessibility considerations for any actions you suggest.`;

    const STARTER_PROMPTS = [
      "My block floods every time it rains hard",
      "My neighborhood has barely any trees and it's unbearable in summer",
      "The air quality near my home seems really bad",
      "I want to get involved in climate action but don't know where to start",
    ];

    function App() {
      const [input, setInput] = useState("");
      const [messages, setMessages] = useState([]);
      const [loading, setLoading] = useState(false);
      const [fact, setFact] = useState(null);
      const bottomRef = useRef(null);

      useEffect(() => {
        if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: "smooth" });
      }, [messages, loading]);

      const handleSubmit = async () => {
        if (!input.trim() || loading) return;
        const userMessage = input.trim();
        setInput("");
        setFact(null);
        const newMessages = [...messages, { role: "user", content: userMessage }];
        setMessages(newMessages);
        setLoading(true);

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: SYSTEM_PROMPT,
              messages: newMessages,
            }),
          });
          const data = await response.json();
          const reply = data.content?.[0]?.text || "Something went wrong — try again!";
          setMessages([...newMessages, { role: "assistant", content: reply }]);
          if (Math.random() < 0.4) {
            setTimeout(() => setFact(PHILLY_FACTS[Math.floor(Math.random() * PHILLY_FACTS.length)]), 600);
          }
        } catch {
          setMessages([...newMessages, { role: "assistant", content: "Oops! Something went wrong. Try again in a moment." }]);
        } finally {
          setLoading(false);
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSubmit(); }
      };

      const s = {
        page: { minHeight: "100vh", background: "#0d1b2a", fontFamily: "'Georgia', 'Times New Roman', serif", color: "#f0e6d3", display: "flex", flexDirection: "column", alignItems: "center", padding: "0 16px 60px" },
        header: { width: "100%", maxWidth: 720, paddingTop: 48, paddingBottom: 32, borderBottom: "2px solid #d4843a", marginBottom: 32 },
        eyebrow: { fontSize: 11, letterSpacing: "0.25em", textTransform: "uppercase", color: "#d4843a", marginBottom: 12 },
        h1: { fontSize: "clamp(28px, 5vw, 48px)", fontWeight: 900, lineHeight: 1.1, color: "#f0e6d3" },
        accent: { color: "#d4843a" },
        subtitle: { marginTop: 16, fontSize: 16, color: "#b8a898", lineHeight: 1.6, maxWidth: 480, fontStyle: "italic" },
        main: { width: "100%", maxWidth: 720 },
        grid: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 32 },
        promptBtn: { background: "transparent", border: "1px solid #2a3f52", borderRadius: 8, padding: "14px 16px", color: "#b8a898", fontSize: 13, textAlign: "left", cursor: "pointer", lineHeight: 1.4, fontFamily: "'Georgia', serif", fontStyle: "italic" },
        messages: { display: "flex", flexDirection: "column", gap: 24 },
        userBubble: { maxWidth: "85%", background: "rgba(212,132,58,0.15)", border: "1px solid rgba(212,132,58,0.4)", borderRadius: "16px 16px 4px 16px", padding: "14px 18px", fontSize: 15, lineHeight: 1.7, color: "#f0e6d3", whiteSpace: "pre-wrap" },
        aiBubble: { maxWidth: "85%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "16px 16px 16px 4px", padding: "14px 18px", fontSize: 15, lineHeight: 1.7, color: "#ddd5c8", whiteSpace: "pre-wrap" },
        aiLabel: { fontSize: 11, letterSpacing: "0.15em", textTransform: "uppercase", color: "#d4843a", marginBottom: 8 },
        dot: (i) => ({ width: 7, height: 7, borderRadius: "50%", background: "#d4843a", animation: "pulse 1.2s ease-in-out infinite", animationDelay: `${i * 0.2}s` }),
        fact: { alignSelf: "center", background: "#d4843a", color: "#0d1b2a", borderRadius: 4, padding: "14px 20px", maxWidth: 420, fontSize: 14, lineHeight: 1.5, fontStyle: "italic", boxShadow: "4px 4px 0px rgba(0,0,0,0.4)", transform: "rotate(-1.2deg)", animation: "fadeSlideIn 0.5s ease" },
        factLabel: { fontSize: 10, letterSpacing: "0.2em", textTransform: "uppercase", fontStyle: "normal", fontWeight: 700, marginBottom: 6, opacity: 0.7 },
        inputRow: { marginTop: 32, display: "flex", gap: 12, alignItems: "flex-end", position: "sticky", bottom: 24 },
        textarea: { flex: 1, background: "rgba(255,255,255,0.05)", border: "1px solid #2a3f52", borderRadius: 12, padding: "14px 16px", color: "#f0e6d3", fontSize: 15, fontFamily: "'Georgia', serif", fontStyle: "italic", resize: "none", lineHeight: 1.5 },
        hint: { textAlign: "center", fontSize: 11, color: "#4a6070", marginTop: 12, letterSpacing: "0.1em" },
      };

      return (
        <div style={s.page}>
          <div style={s.header}>
            <div style={s.eyebrow}>Philadelphia Climate Action Guide</div>
            <h1 style={s.h1}>What's your<br /><span style={s.accent}>climate concern?</span></h1>
            <p style={s.subtitle}>Describe what you're experiencing — flooding, heat, poor air, lack of trees — and get real Philly resources and next steps.</p>
          </div>

          <div style={s.main}>
            {messages.length === 0 && (
              <div style={s.grid}>
                {STARTER_PROMPTS.map(p => (
                  <button key={p} style={s.promptBtn} onClick={() => setInput(p)}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = "#d4843a"; e.currentTarget.style.color = "#f0e6d3"; e.currentTarget.style.background = "rgba(212,132,58,0.08)"; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = "#2a3f52"; e.currentTarget.style.color = "#b8a898"; e.currentTarget.style.background = "transparent"; }}>
                    "{p}"
                  </button>
                ))}
              </div>
            )}

            <div style={s.messages}>
              {messages.map((msg, i) => (
                <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: msg.role === "user" ? "flex-end" : "flex-start" }}>
                  <div style={msg.role === "user" ? s.userBubble : s.aiBubble}>
                    {msg.role === "assistant" && <div style={s.aiLabel}>Your Philly Climate Guide</div>}
                    {msg.content}
                  </div>
                </div>
              ))}

              {loading && (
                <div style={{ display: "flex" }}>
                  <div style={{ ...s.aiBubble, display: "flex", gap: 6, alignItems: "center" }}>
                    {[0,1,2].map(i => <div key={i} style={s.dot(i)} />)}
                  </div>
                </div>
              )}

              {fact && (
                <div style={s.fact}>
                  <div style={s.factLabel}>Did you know?</div>
                  {fact}
                </div>
              )}

              <div ref={bottomRef} />
            </div>

            <div style={s.inputRow}>
              <textarea
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="Describe your climate concern…"
                rows={2}
                style={s.textarea}
                onFocus={e => e.target.style.borderColor = "#d4843a"}
                onBlur={e => e.target.style.borderColor = "#2a3f52"}
              />
              <button
                onClick={handleSubmit}
                disabled={!input.trim() || loading}
                style={{ background: input.trim() && !loading ? "#d4843a" : "#2a3f52", color: input.trim() && !loading ? "#0d1b2a" : "#4a6070", border: "none", borderRadius: 12, padding: "14px 22px", fontSize: 14, fontWeight: 700, cursor: input.trim() && !loading ? "pointer" : "default", fontFamily: "'Georgia', serif", letterSpacing: "0.05em", whiteSpace: "nowrap" }}>
                Ask →
              </button>
            </div>
            <div style={s.hint}>Press Enter to send · Shift+Enter for new line</div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
